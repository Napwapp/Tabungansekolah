<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="landingpage/Halamanlogin/css/mycss/resetpass.css">
</head>
<body>
    <div class="container page" id="set-new-password">
        <div class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgb(223, 102, 102)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h1>Set new password</h1>
        <p class="subtitle">Your new password must be different to previously used passwords.</p>
        
        <form onsubmit="showPasswordReset(event)">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" value="" required>
                <small>Must be at least 8 characters.</small>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm password</label>
                <input type="password" id="confirm-password" value="" required>
            </div>
            <button type="submit">Reset password</button>
        </form>
        
        <a href="#" class="back-link" onclick="showForgotPassword()">
            <span class="back-icon">←</span> Back to log in
        </a>
    </div>
</body>
</html>
