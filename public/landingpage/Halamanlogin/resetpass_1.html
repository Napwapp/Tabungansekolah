<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="landingpage/Halamanlogin/css/mycss/resetpass.css">
</head>
<body>
    <div class="container page active" id="forgot-password">
        <div class="icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgb(223, 102, 102)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13 12H3"></path>
            </svg>
        </div>
        <h1>Forgot password?</h1>
        <p class="subtitle">No worries, we'll send you reset instructions.</p>
        
        <form>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <button type="submit">Reset password</button>
        </form>
        
        <a href="#" class="back-link">
            <span class="back-icon">←</span> Back to log in
        </a>
    </div>
</body>
</html>
